      const barCls = pct < 20 ? 'danger' : (pct < 50 ? 'warn' : '');
      mainAmountHtml = `<span class="${remaining>=0?'amount-remaining':'amount-receivable'}">${fmt(remaining)}</span>`;
      mainLabel = `盈利 ${profit >= 0 ? '+' : ''}${fmt(profit)}`;
      barHtml = `<div class="balance-bar"><div class="balance-bar-fill ${barCls}" style="width:${pct}%"></div></div>`;
    }

    const joinedStr = m.joinedAt > 0
      ? (m.joinedAt === 0 ? '首批成员' : (function(){
          const d = new Date(m.joinedAt);
          return '加入于 ' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        })())
      : '首批成员';

    const lentOut = m.lentOut || 0;
    const repaid = m.repaid || 0;
    const outstanding = Math.max(0, lentOut - repaid);

    return `<div class="member-row" style="padding:14px 0;">
      <div class="avatar" style="background:${bg};color:${fg}; width:44px; height:44px;">${escapeHtml(m.name.slice(0,2))}</div>
      <div class="member-info">
        <div class="member-name">${escapeHtml(m.name)}${typeBadge}</div>
        <div class="member-sub">
          ${isCredit
            ? `<span class="seg">已花 <b>${fmt(s.perCost)}</b></span>
               <span class="seg">分得 <b style="color:var(--green)">${fmt(s.perWin)}</b></span>
               <span class="seg">垫出 <b style="color:var(--red)">${fmt(lentOut)}</b></span>
               <span class="seg">已还 <b style="color:var(--green)">${fmt(repaid)}</b></span>`
            : `<span class="seg">预存 <b>${fmt(m.capital)}</b></span>
               <span class="seg">已花 <b>${fmt(s.perCost)}</b></span>
               <span class="seg">分得 <b style="color:var(--green)">${fmt(s.perWin)}</b></span>`}
          <span class="seg" style="color:var(--text3)">· ${escapeHtml(joinedStr)}</span>
        </div>
        ${barHtml}
        ${isCredit && outstanding > 0
          ? `<div style="font-size:11px;color:var(--red);margin-top:4px;font-weight:500">⚠ 仍欠你 ${fmt(outstanding)}</div>`
          : ''}
        ${isCredit && (s.autoRepaid || 0) > 0
          ? `<div style="font-size:11px;color:var(--green);margin-top:2px">✓ 本轮奖金自动还款 ${fmt(s.autoRepaid)}</div>`
          : ''}
        <div class="settle-row">
          ${isCredit
            ? `<button class="btn btn-sm" onclick="lendToCredit('${m.id}')">💰 垫付</button>
               <button class="btn btn-sm" onclick="recordRepay('${m.id}')">💵 还款</button>
               <button class="btn btn-sm" onclick="settleCredit('${m.id}')">结算</button>
               <button class="btn btn-sm btn-danger" onclick="deleteMember('${m.id}')">删除</button>`
            : `<button class="btn btn-sm" onclick="quickRecharge('${m.id}')">+ 充值</button>
               <button class="btn btn-sm" onclick="resetMember('${m.id}')">↻ 重置</button>
               <button class="btn btn-sm btn-danger" onclick="deleteMember('${m.id}')">删除</button>`}
        </div>
      </div>
        <div class="member-right" style="text-align:right;">
          ${mainAmountHtml}
          <div class="sub">${isCredit ? (profit < 0 ? '应收（他欠我）' : (profit > 0 ? '应付（我欠他）' : '盈亏平衡')) : '本金余额'}</div>
          <div class="sub" style="color:${profit>=0?'var(--green)':'var(--red)'}">盈利${profit >= 0 ? '+' : ''}${fmt(profit)}</div>
        </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   渲染：彩票项
   ═══════════════════════════════════════════ */
function renderTicketItem(t, showDelete = true) {
  const n = members.length;
  const perCost = n > 0 ? t.cost / n : 0;
  const perWin = n > 0 ? t.win / n : 0;
  // 兼容老数据：老票没有 status 字段，按 win 是否 > 0 推断
  const status = t.status || (t.win > 0 ? 'won' : 'lost');
  const badge = status === 'won'
    ? `<span class="badge badge-win">🏆 中奖 ${fmt(t.win)}</span>`
    : status === 'lost'
      ? `<span class="badge badge-loss">未中奖</span>`
      : `<span class="badge badge-pending">⏳ 待开奖</span>`;

  const matchHtml = (t.teamA && t.teamB)
    ? `<div class="ticket-meta">
         <span class="match-info">⚽ ${escapeHtml(t.teamA)} <span class="vs">VS</span> ${escapeHtml(t.teamB)}</span>
       </div>`
    : '';

  // 显示参与成员
  const participantNames = t.participants
    ? t.participants.map(pid => {
        const m = members.find(x => x.id === pid);
        return m ? m.name : '';
      }).filter(Boolean)
    : members.filter(m => (m.joinedAt || 0) <= (t.createdAt || 0)).map(m => m.name);
  const participantHtml = participantNames.length > 0 && participantNames.length < members.length
    ? `<div class="ticket-meta"><span style="color:var(--text2);font-size:12px;">参与：<b>${participantNames.join('、')}</b></span></div>`
    : '';

  return `<div class="ticket-item">
    <div class="ticket-top">
      <span class="ticket-name">${escapeHtml(t.name)}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${badge}
        ${showDelete ? `<button class="del-btn" onclick="deleteTicket('${t.id}')" title="删除">×</button>` : ''}
      </div>
    </div>
    ${matchHtml}
    <div class="ticket-meta">
      <span>花费 ${fmt(t.cost)}</span>
      <span>· ${participantNames.length} 人参与</span>
      ${t.date?`<span>${t.date.replace(/-/g, '/')}</span>`:''}
    </div>
    ${participantHtml}
    ${t.note?`<div class="ticket-note">${escapeHtml(t.note)}</div>`:''}
    <div class="ticket-imgs" id="imgs-${t.id}"></div>
    <div class="ticket-actions">
      ${status === 'pending'
        ? `<button class="btn-settle" onclick="openSettleModal('${t.id}')">🎯 去开奖</button>`
        : `<button class="btn-resettle" onclick="openSettleModal('${t.id}')">✏️ 修改结算</button>`}
      ${showDelete ? `<button class="btn-resettle" onclick="deleteTicket('${t.id}')" style="color:var(--red);border-color:var(--red)">🗑 删除</button>` : ''}
    </div>
  </div>`;
}

async function renderTicketImages(t) {
  const wrap = document.getElementById('imgs-' + t.id);
  if (!wrap || !t.images || t.images.length === 0) return;

  const max = 4;
  const showCount = Math.min(t.images.length, max);
  for (let i = 0; i < showCount; i++) {
    const url = await getImageUrl(t.images[i]);
    if (!url) continue;
    const isLast = i === max - 1 && t.images.length > max;
    wrap.innerHTML += `<div class="ti"
                          onclick="openViewer('${t.id}', ${i})">
                          <img src="${url}" alt="" loading="lazy">
                          ${isLast ? `<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:500;background:rgba(0,0,0,0.45)">+${t.images.length - max}</span>` : ''}
                        </div>`;
  }
}

function renderTickets() {
  const wrap = document.getElementById('ticket-list-wrap');
  document.getElementById('tkt-page-count').textContent = tickets.length + ' 张';

  if (tickets.length === 0) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">⚽</div>还没有彩票记录<br>去「记票」页添加吧</div>';
    return;
  }
  const all = [...tickets].reverse();
  wrap.innerHTML = all.map(t => renderTicketItem(t, true)).join('');
  all.forEach(t => renderTicketImages(t));
}

/* ═══════════════════════════════════════════
   奖池预览（记账页）
   ═══════════════════════════════════════════ */
function calcPreview() {
  const cost = parseFloat(document.getElementById('t-cost').value) || 0;
  // 记票时立即从本金扣除，奖金开奖后到账
  const card = document.getElementById('preview-card');
  const content = document.getElementById('preview-content');

  if (cost === 0 || members.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';

  // 提示：记票时成本立即扣除
  const activeMembers = members.filter(m => selectedParticipants.includes(m.id));
  const n = activeMembers.length;
  const perCost = n > 0 ? cost / n : 0;

  content.innerHTML = `
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">
      本次购买 <b>${fmt(cost)}</b> · ${n > 0 ? n + ' 人参与，每人扣 ' + fmt(perCost) : '请选择参与成员'}
    </div>
    <div style="font-size:11px;color:var(--green);background:var(--green-bg);padding:6px 8px;border-radius:4px;">
      ✓ 记票时立即从本金扣除 ${fmt(cost)}，开奖后奖金自动到账
    </div>`;
}

/* ══════════════════════════════════════════
   参与者选择
   ══════════════════════════════════════════ */
let selectedParticipants = [];      // 当前选中的成员 ID 数组
let participantsInitialized = false; // 是否已被用户操作过（区分"未初始化"和"全不选"）

function renderParticipantSelect() {
  const wrap = document.getElementById('participant-select');
  if (!wrap) {
    console.error('participant-select element not found');
    return;
  }
  if (members.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0;">请先添加成员</div>';
    return;
  }
  // 首次进入表单时默认全选；之后保留用户的选择（包括"全不选"）
  if (!participantsInitialized) {
    selectedParticipants = members.map(m => m.id);
    participantsInitialized = true;
  }
  let html = '';
  members.forEach((m, i) => {
    const colors = ['#4a90d9','#52c41a','#fa8c16','#f5222d','#531dab','#13c2c2','#eb2f96','#faad14'];
    const bg = colors[i % colors.length];
    const checked = selectedParticipants.includes(m.id);
    html += `<div style="
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 12px;margin:4px;
      border:1px solid ${checked ? '#4a90d9' : '#e0e0e0'};
      border-radius:4px;
      background:${checked ? '#e8f0fe' : '#fff'};
      cursor:pointer;font-size:13px;
    " onclick="toggleParticipant('${m.id}')">
      <span style="width:14px;height:14px;border:1px solid #ccc;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;">
        ${checked ? '✓' : ''}
      </span>
      <span style="width:20px;height:20px;border-radius:3px;background:${bg};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;">${m.name.charAt(0)}</span>
      <span>${m.name}</span>
    </div>`;
  });
  // 只渲染成员 chip；"全选/全不选"按钮由 HTML 中的 .participant-actions 静态提供（避免在滚动区内被遮挡）
  wrap.innerHTML = html;
}

function toggleParticipant(id) {
  participantsInitialized = true;
  const idx = selectedParticipants.indexOf(id);
  if (idx >= 0) {
    selectedParticipants.splice(idx, 1);
  } else {
    selectedParticipants.push(id);
  }
  renderParticipantSelect();
}

function selectAllParticipants(checked) {
  participantsInitialized = true;
  if (checked) {
    selectedParticipants = members.map(m => m.id);
  } else {
    selectedParticipants = [];
  }
  renderParticipantSelect();
}

function getSelectedParticipants() {
  return [...selectedParticipants];
}

/* ══════════════════════════════════════════
   开奖状态切换（三态）
   ══════════════════════════════════════════ */
function setTicketStatus(status) {
  // 更新 radio 选中状态
  const radios = document.querySelectorAll('input[name="t-status"]');
  radios.forEach(r => { r.checked = (r.value === status); });
  // 更新分段控件视觉
  document.querySelectorAll('#status-control .seg-opt').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.value === status);
  });
  // 控制中奖金额输入框显隐
  const winGroup = document.getElementById('win-amount-group');
  const winInput = document.getElementById('t-win');
  if (status === 'won') {
    winGroup.style.display = '';
  } else {
    winGroup.style.display = 'none';
    winInput.value = '';  // 切到非中奖时清空
  }
  calcPreview();
}

function getTicketStatus() {
  const checked = document.querySelector('input[name="t-status"]:checked');
  return checked ? checked.value : 'pending';
}

/* ══════════════════════════════════════════
   票卡片：开奖 / 修改结算 弹窗
   ══════════════════════════════════════════ */
let settleTargetId = null;
let settleCurrentStatus = 'pending';

function openSettleModal(ticketId) {
  const t = tickets.find(x => x.id === ticketId);
  if (!t) return;
  settleTargetId = ticketId;
  // 推断当前状态（兼容老数据）
  settleCurrentStatus = t.status || (t.win > 0 ? 'won' : 'lost');
  // 子标题：显示票名 + 购买金额
  document.getElementById('settle-sub').textContent =
    `${escapeHtml(t.name)} · 购买 ${fmt(t.cost)}`;
  // 重置 win 输入为当前值（仅 won 时填）
  document.getElementById('settle-win').value = (settleCurrentStatus === 'won' && t.win > 0) ? t.win : '';
  setSettleStatus(settleCurrentStatus);
  // 标题随状态变化
  document.getElementById('settle-title').textContent = settleCurrentStatus === 'pending' ? '开奖结算' : '修改结算';
  document.getElementById('settle-mask').classList.add('show');
  // 焦点
  setTimeout(() => {
    if (settleCurrentStatus === 'won') {
      const inp = document.getElementById('settle-win');
      if (inp) { inp.focus(); inp.select(); }
    }
  }, 50);
}

function setSettleStatus(status) {
  settleCurrentStatus = status;
  // 同步 radio
  document.querySelectorAll('input[name="s-status"]').forEach(r => {
    r.checked = (r.value === status);
  });
  // 同步分段控件视觉
  document.querySelectorAll('#settle-control .seg-opt').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.value === status);
  });
  // 中奖金额输入框显隐
  const winGroup = document.getElementById('settle-win-group');
  if (status === 'won') {
    winGroup.style.display = '';
  } else {
    winGroup.style.display = 'none';
    // 切走时不清空输入框（避免用户来回切换丢失数据）
  }
}

function closeSettleModal(ok) {
  if (!ok) {
    document.getElementById('settle-mask').classList.remove('show');
    settleTargetId = null;
    return;
  }
  const status = settleCurrentStatus;
  const winRaw = document.getElementById('settle-win').value;
  const win = (status === 'won') ? (parseFloat(winRaw) || 0) : 0;
  // 校验：中奖必须填金额
  if (status === 'won' && win <= 0) {
    showToast('请输入中奖金额');
    // 保持弹窗，重新聚焦输入框
    setTimeout(() => {
      const inp = document.getElementById('settle-win');
      if (inp) { inp.focus(); inp.select(); }
    }, 50);
    return;
  }
  // 通过校验 → 关闭 + 写回数据
  document.getElementById('settle-mask').classList.remove('show');
  const id = settleTargetId;
  settleTargetId = null;
  if (id) {
    const t = tickets.find(x => x.id === id);
    if (!t) return;
    t.status = status;
    t.win = (status === 'won') ? win : 0;
    t.settledAt = (status === 'pending') ? null : Date.now();
    saveData(KEYS.tickets, tickets);
    renderAll();
    if (status === 'pending') {
      showToast('已重置为待开奖');
    } else if (status === 'won') {
      showToast('已结算：中奖 ' + fmt(win));
    } else {
      showToast('已结算：未中奖');
    }
  }
}

/* ══════════════════════════════════════════
   操作：添加 / 重置 / 充值 / 删除 / 结算 成员
   ══════════════════════════════════════════ */
function toggleCreditMode() {
  const isCredit = document.getElementById('m-credit').checked;
  const capGroup = document.getElementById('m-capital-group');
  const capInput = document.getElementById('m-capital');
  if (isCredit) {
    capGroup.style.display = 'none';
    capInput.value = '0';
  } else {
    capGroup.style.display = '';
  }
}

function addMember() {
  const name = document.getElementById('m-name').value.trim();
  const isCredit = document.getElementById('m-credit').checked;
  const capital = isCredit ? 0 : (parseFloat(document.getElementById('m-capital').value) || 0);
  if (!name) { showToast('请输入姓名'); return; }

  const existing = members.find(m => m.name === name);
  if (existing) {
    // 已存在：仅当输入了金额才认为是充值
    if (capital > 0) {
      existing.capital += capital;
      saveData(KEYS.members, members);
      showToast(name + ' 充值 ' + fmt(capital));
    } else {
      showToast('该成员已存在，请输入充值金额');
      return;
    }
  } else {
    // 新增：按当前模式添加
    members.push({ id: uid(), name, capital, type: isCredit ? 'credit' : 'paid', joinedAt: Date.now() });
    saveData(KEYS.members, members);
    showToast(isCredit ? ('已添加代垫成员：' + name) : ('已添加：' + name));
  }

  document.getElementById('m-name').value = '';
  document.getElementById('m-capital').value = '';
  document.getElementById('m-credit').checked = false;
  document.getElementById('m-capital-group').style.display = '';
  renderAll();
}

async function quickRecharge(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const v = await openModal({
    title: '为 ' + m.name + ' 充值',
    body: '请输入充值金额（元）',
    okText: '充值',
    withInput: true,
    defaultValue: '200',
  });
  if (v === false) return;
  const num = parseFloat(v);
  if (isNaN(num) || num <= 0) { showToast('金额无效'); return; }
  m.capital += num;
  saveData(KEYS.members, members);
  renderAll();
  showToast(m.name + ' 充值 ' + fmt(num));
}

async function resetMember(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const ok = await openModal({
    title: '重置预存',
    body: '确定要重置 <b>' + escapeHtml(m.name) + '</b> 的累计预存为 0 吗？<br><span style="color:var(--text3);font-size:11px">（彩票记录不会删除）</span>',
    okText: '重置',
    danger: true,
  });
  if (!ok) return;
  m.capital = 0;
  saveData(KEYS.members, members);
  renderAll();
  showToast('已重置 ' + m.name + ' 的预存');
}

async function settleCredit(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const { memberStats } = calcStats();
  const s = memberStats[id];
  if (!s || s.profit === 0) {
    showToast(m.name + ' 当前盈亏为 0，无需结算');
    return;
  }
  const action = s.profit < 0
    ? '<b>' + escapeHtml(m.name) + '</b> 欠你 <b style="color:var(--red)">' + fmt(-s.profit) + '</b>，确认已收到？'
    : '你欠 <b>' + escapeHtml(m.name) + '</b> <b style="color:var(--purple)">' + fmt(s.profit) + '</b>，确认已支付？';
  const ok = await openModal({
    title: '结算代垫账目',
    body: action + '<br><span style="color:var(--text3);font-size:11px">（结算后此笔账目清零，历史彩票记录保留）</span>',
    okText: '确认结算',
    danger: true,
  });
  if (!ok) return;

  if (!m.settled) m.settled = 0;
  m.settled += s.profit;  // 正数表示已付给他，负数表示已收到他
  saveData(KEYS.members, members);
  renderAll();
  showToast(m.name + ' 结算完成，账目已清零');
}

/* 庄家为代垫成员"垫付"：记录垫出金额，同时给该成员补充预存（用于后续分摊） */
async function lendToCredit(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const { memberStats } = calcStats();
  const s = memberStats[id];
  const outstanding = Math.max(0, (s.lentOut || 0) - (s.repaid || 0));
  const v = await openModal({
    title: '为 ' + m.name + ' 垫付',
    body: '请输入本次垫付金额（元）<br>'
      + (outstanding > 0
          ? '<span style="color:var(--text3);font-size:11px">当前已垫未还：' + fmt(outstanding) + '</span>'
          : '<span style="color:var(--text3);font-size:11px">他目前无未还垫款</span>'),
    okText: '确认垫付',
    withInput: true,
    defaultValue: '100',
  });
  if (v === false) return;
  const num = parseFloat(v);
  if (isNaN(num) || num <= 0) { showToast('金额无效'); return; }
  m.lentOut = (m.lentOut || 0) + num;
  m.capital = (m.capital || 0) + num;  // 同步补充预存本金
  saveData(KEYS.members, members);
  renderAll();
  showToast('已为 ' + m.name + ' 垫付 ' + fmt(num));
}

/* 代垫成员"还款"：减少未还垫款 */
async function recordRepay(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const { memberStats } = calcStats();
  const s = memberStats[id];
  const outstanding = Math.max(0, (s.lentOut || 0) - (s.repaid || 0));
  if (outstanding <= 0) {
    showToast(m.name + ' 当前无未还垫款');
    return;
  }
  const v = await openModal({
    title: m.name + ' 还款',
    body: '请输入本次还款金额（元）<br>'
      + '<span style="color:var(--text3);font-size:11px">当前未还：' + fmt(outstanding) + '</span>',
    okText: '确认收到',
    withInput: true,
    defaultValue: outstanding.toFixed(2),
  });
  if (v === false) return;
  const num = parseFloat(v);
  if (isNaN(num) || num <= 0) { showToast('金额无效'); return; }
  if (num > outstanding) {
    showToast('还款金额超过未还金额');
    return;
  }
  m.repaid = (m.repaid || 0) + num;
  m.capital = Math.max(0, (m.capital || 0) - num);  // 减少预存
  saveData(KEYS.members, members);
  renderAll();
  showToast(m.name + ' 已还款 ' + fmt(num));
}

async function deleteMember(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const ok = await openModal({
    title: '删除成员',
    body: '确定删除成员 <b>' + escapeHtml(m.name) + '</b> 吗？<br><span style="color:var(--text3);font-size:11px">（仅删除成员，不影响已记录的彩票）</span>',
    okText: '删除',
    danger: true,
  });
  if (!ok) return;
  members = members.filter(x => x.id !== id);
  // 同步清理所有彩票的参与者引用
  tickets.forEach(t => {
    if (t.participants) {
      t.participants = t.participants.filter(pid => pid !== id);
    }
  });
  saveData(KEYS.members, members);
  saveData(KEYS.tickets, tickets);
  renderAll();
  showToast('已删除：' + m.name);
}

/* ═══════════════════════════════════════════
   操作：添加 / 删除彩票
   ═══════════════════════════════════════════ */
async function addTicket() {
  const name = document.getElementById('t-name').value.trim();
  const cost = parseFloat(document.getElementById('t-cost').value) || 0;
  // 记票时状态固定为"待开奖"，中奖金额固定为 0
  const status = 'pending';
  const win = 0;
  const date = document.getElementById('t-date').value;
  const note = document.getElementById('t-note').value.trim();
  const teamA = document.getElementById('t-teamA').value.trim();
  const teamB = document.getElementById('t-teamB').value.trim();

  if (!name) { showToast('请输入彩票名称'); return; }
  if (cost <= 0) { showToast('请输入购买金额'); return; }

  const ticket = {
    id: uid(), name, cost, win, date, note,
    teamA, teamB,
    status,  // 记票时固定为 'pending'，在彩票列表里通过"去开奖"修改
    images: [...pendingImages],
    createdAt: Date.now(),
    participants: getSelectedParticipants(),
  };
  tickets.push(ticket);
  saveData(KEYS.tickets, tickets);

  document.getElementById('t-name').value = '';
  document.getElementById('t-cost').value = '';
  document.getElementById('t-date').value = '';
  document.getElementById('t-note').value = '';
  document.getElementById('t-teamA').value = '';
  document.getElementById('t-teamB').value = '';
  document.getElementById('preview-card').style.display = 'none';

  // 重置参与者选择（下次添加时默认全选）
  selectedParticipants = [];
  participantsInitialized = false;
  renderParticipantSelect();

  for (const id of pendingImages) imageUrlCache.delete(id);
  pendingImages = [];
  document.getElementById('img-preview-grid').innerHTML = '';

  renderAll();
  showToast('彩票记录已保存');
  switchPage(2);
}

async function deleteTicket(id) {
  const ok = await openModal({
    title: '删除彩票记录',
    body: '确定删除该彩票记录？<br><span style="color:var(--text3);font-size:11px">（关联图片也会一并删除）</span>',
    okText: '删除',
    danger: true,
  });
  if (!ok) return;
  const t = tickets.find(x => x.id === id);
  if (t && t.images) {
    for (const imgId of t.images) {
      await deleteImage(imgId);
      imageUrlCache.delete(imgId);
    }
  }
  tickets = tickets.filter(x => x.id !== id);
  saveData(KEYS.tickets, tickets);
  renderAll();
  showToast('已删除记录');
}

/* ═══════════════════════════════════════════
   图片选择 / 压缩 / 预览
   ═══════════════════════════════════════════ */
async function handleImageSelect(e) {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  const remain = 9 - pendingImages.length;
  if (remain <= 0) { showToast('最多上传 9 张图片'); return; }
  const toAdd = files.slice(0, remain);

  for (const file of toAdd) {
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 10 * 1024 * 1024) { showToast('单张图片不能超过 10MB'); continue; }
    try {
      const compressed = await compressImage(file, 1600, 0.85);
      const id = 'img_' + uid();
      await saveImage(id, compressed);
      pendingImages.push(id);
    } catch (err) { console.error(err); }
  }
  e.target.value = '';
  await refreshImagePreview();
  showToast('已添加 ' + toAdd.length + ' 张图片');
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = h * maxSize / w; w = maxSize; }
          else { w = w * maxSize / h; h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('压缩失败')), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function refreshImagePreview() {
  const grid = document.getElementById('img-preview-grid');
  grid.innerHTML = '';
  for (let i = 0; i < pendingImages.length; i++) {
    const id = pendingImages[i];
    const url = await getImageUrl(id);
    if (!url) continue;
    grid.innerHTML += `<div class="img-thumb">
      <img src="${url}" alt="">
      <span class="remove" onclick="removePendingImage('${id}')">×</span>
    </div>`;
  }
}

async function removePendingImage(id) {
  pendingImages = pendingImages.filter(x => x !== id);
  await deleteImage(id);
  imageUrlCache.delete(id);
  await refreshImagePreview();
}

/* ═══════════════════════════════════════════
   图片查看器
   ═══════════════════════════════════════════ */
async function openViewer(ticketId, imgIdx) {
  const t = tickets.find(x => x.id === ticketId);
  if (!t || !t.images) return;
  currentViewerImages = t.images;
  currentViewerIdx = imgIdx || 0;
  await showViewerImage();
  document.getElementById('image-viewer').classList.add('show');
}

async function showViewerImage() {
  const id = currentViewerImages[currentViewerIdx];
  const url = await getImageUrl(id);
  document.getElementById('viewer-img').src = url || '';
  document.getElementById('viewer-pos').textContent =
    `${currentViewerIdx + 1} / ${currentViewerImages.length}`;
  document.getElementById('prev-btn').disabled = currentViewerIdx === 0;
  document.getElementById('next-btn').disabled =
    currentViewerIdx === currentViewerImages.length - 1;
}

function viewerNav(dir) {
  const next = currentViewerIdx + dir;
  if (next < 0 || next >= currentViewerImages.length) return;
  currentViewerIdx = next;
  showViewerImage();
}

function closeViewer() {
  document.getElementById('image-viewer').classList.remove('show');
}

document.getElementById('image-viewer').addEventListener('click', e => {
  if (e.target.id === 'image-viewer') closeViewer();
});

/* ═══════════════════════════════════════════
   重置全部数据
   ═══════════════════════════════════════════ */
async function confirmReset() {
  const ok = await openModal({
    title: '清空所有数据',
    body: '此操作将删除<b>所有成员和彩票记录</b>，不可恢复！<br><span style="color:var(--red);font-size:11px">建议先截图保存</span>',
    okText: '确认清空',
    danger: true,
  });
  if (!ok) return;
  for (const t of tickets) {
    if (t.images) {
      for (const imgId of t.images) await deleteImage(imgId);
    }
  }
  for (const id of pendingImages) await deleteImage(id);
  imageUrlCache.forEach(url => URL.revokeObjectURL(url));
  imageUrlCache.clear();

  localStorage.removeItem(KEYS.members);
  localStorage.removeItem(KEYS.tickets);
  members = [];
  tickets = [];
  pendingImages = [];
  renderAll();
  showToast('已清空所有数据');
}

/* ═══════════════════════════════════════════
   导航
   ═══════════════════════════════════════════ */
const pages = ['pg-overview', 'pg-members', 'pg-tickets', 'pg-add', 'pg-member-detail'];

function switchPage(idx) {
  pages.forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // 详情页：更新顶部标题栏显示返回按钮
  const topBar = document.querySelector('.top-bar');
  if (idx === 4) {
    // 显示返回按钮
    if (!document.getElementById('detail-back-btn')) {
      const backBtn = document.createElement('button');
      backBtn.id = 'detail-back-btn';
      backBtn.className = 'reset-btn';
      backBtn.style.cssText = 'margin-right:8px;font-size:16px;padding:5px 10px;';
      backBtn.innerHTML = '← 返回';
      backBtn.onclick = () => switchPage(0);
      topBar.insertBefore(backBtn, topBar.querySelector('.reset-btn'));
    }
    document.getElementById('detail-back-btn').style.display = '';
  } else {
    const backBtn = document.getElementById('detail-back-btn');
    if (backBtn) backBtn.style.display = 'none';
    if (idx !== 3) {
      // 不在记票页时不做日期操作
    } else {
      // 进入记票页：日期为空时才设默认值
      const dateInput = document.getElementById('t-date');
      if (!dateInput.value) dateInput.value = todayStr();
      renderParticipantSelect();
    }
  }
}

/* ═══════════════════════════════════════════
   统一渲染
   ═══════════════════════════════════════════ */
function renderAll() {
  renderOverview();
  renderMembers();
  renderTickets();
  calcPreview();
}

/* ═══════════════════════════════════════════
   初始化
   ═══════════════════════════════════════════ */
(function init() {
  const today = todayStr();
  document.getElementById('t-date').value = today;
  renderAll();
})();
</script>
