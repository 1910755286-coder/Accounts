<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>老爷保佑</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --text2: #64748b;
    --text3: #94a3b8;
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --primary-bg: #eef2ff;
    --primary-bg2: #e0e7ff;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --red: #f43f5e;
    --red-bg: #fff1f2;
    --orange: #f59e0b;
    --orange-bg: #fffbeb;
    --purple: #8b5cf6;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(circle at 0% 0%, rgba(99,102,241,0.05) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(139,92,246,0.05) 0%, transparent 50%),
      linear-gradient(180deg, #f0f0f8 0%, #f5f5fa 40%, #fafafa 100%);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    border-radius: 0;
  }

  /* ── 顶部标题栏（渐变美化）── */
  .top-bar {
    padding: 20px 16px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 70%, #7c3aed 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: none;
    position: relative;
  }
  .top-bar h1 {
    font-size: 22px; font-weight: 800;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 1px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .top-bar .sub {
    font-size: 11px; color: rgba(255,255,255,0.72); margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .top-bar .reset-btn {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; padding: 5px 14px;
    border-radius: 20px; font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background var(--transition);
    font-family: inherit;
  }
  .top-bar .reset-btn:hover { background: rgba(255,255,255,0.28); }

  /* ── 底部导航 ── */
  .bottom-nav {
    display: flex;
    border-top: none;
    background: var(--bg);
    position: sticky;
    bottom: 0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    z-index: 10;
    padding-top: 2px;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 10px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    border: none;
    background: none;
    gap: 3px;
    position: relative;
    transition: color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active {
    color: var(--primary);
    font-weight: 600;
  }
  .nav-item.active::before {
    content: "";
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 24px; height: 3px;
    background: var(--primary);
    border-radius: 0 0 3px 3px;
  }
  .nav-item .nav-icon {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-item.active .nav-icon {
    transform: scale(1.12);
  }
  .nav-icon {
    font-size: 18px; line-height: 1;
  }

  /* ── 页面内容区 ── */
  .pages { flex: 1; overflow: hidden; }
  .page {
    display: none;
    padding: 20px 16px 24px;
    overflow-y: auto;
    background: var(--bg2);
  }
  .page.active {
    display: block;
    animation: pageFadeIn 0.3s ease;
  }
  @keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 内容卡片容器 ── */
  .content-card {
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
  }
  .content-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── 通用组件 ── */
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 12px; margin-top: 4px;
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 8px;
    border-bottom: none;
    font-size: 15px;
  }
  .section-title::after {
    content: "";
    display: block;
    height: 2px;
    background: linear-gradient(90deg, var(--primary), transparent);
    border-radius: 1px;
    margin-top: 8px;
  }
  .section-title .badge-count {
    font-size: 12px; color: var(--text3); font-weight: 400;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition), transform var(--transition);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--primary);
    opacity: 0.6;
  }
  .stat-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.3px; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--primary); }

  /* ── 成员行 ── */
  .member-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
    border-bottom: none;
    background: var(--bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition);
  }
  .member-row:hover {
    box-shadow: var(--shadow);
  }
  .member-row:last-child { margin-bottom: 0; }
  .avatar {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
    background: var(--primary-bg); color: var(--primary);
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .member-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .member-sub span { margin-right: 8px; }
  .member-sub b { color: var(--text); font-weight: 500; }
  .member-right { font-size: 15px; font-weight: 500; text-align: right; flex-shrink: 0; }
  .member-right .sub { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 400; }

  /* ── 代垫/已存 成员样式 ── */
  .badge-type {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-type.paid { background: #f0f9eb; color: var(--green); }
  .badge-type.credit { background: #f0f0ff; color: #531dab; }

  /* 应收：会员欠庄家（红色，加粗） */
  .amount-receivable { color: var(--red); font-weight: 600; }
  /* 应付：庄家欠会员（紫色） */
  .amount-payable { color: #531dab; font-weight: 600; }
  /* 剩余本金（已存会员） */
  .amount-remaining { color: var(--text); font-weight: 500; }

  /* 代垫模式开关 */
  .credit-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: border-color var(--transition), background var(--transition);
  }
  .credit-toggle:hover {
    border-color: var(--primary);
    background: var(--primary-bg);
    user-select: none;
  }
  .credit-toggle input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
  .credit-toggle .lbl { font-size: 12px; color: var(--text2); flex: 1; line-height: 1.4; }
  .credit-toggle .hint { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 400; }

  /* 结算清单（应收/应付） */
  .settle-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 12px;
    box-shadow: var(--shadow-sm);
  }
  .settle-card .sc-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
  .settle-row-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px dashed var(--border);
  }
  .settle-row-item:last-child { border-bottom: none; }
  .settle-row-item .name { color: var(--text); }
  .settle-row-item .num { font-weight: 600; }
  .settle-row-item .desc { font-size: 10px; color: var(--text3); margin-left: 6px; }

  /* ── 进度条（剩余本金可视化）── */
  .balance-bar {
    height: 4px; background: var(--bg2); border-radius: 3px;
    margin-top: 8px; overflow: hidden;
  }
  .balance-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px;
    transition: width .3s;
  }
  .balance-bar-fill.warn { background: var(--orange); }
  .balance-bar-fill.danger { background: var(--red); }

  /* ── 彩票记录 ── */
  .ticket-item {
    padding: 14px 14px;
    border-bottom: none;
    background: var(--bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition);
  }
  .ticket-item:hover {
    box-shadow: var(--shadow);
  }
  .ticket-item:last-child { margin-bottom: 0; }
  .ticket-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 6px;
  }
  .ticket-name { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.4; color: var(--text); }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; flex-shrink: 0;
    font-weight: 600;
  }
  .badge-win { background: linear-gradient(135deg, #ecfdf5, #d1fae5); color: var(--green); font-weight: 600; }
  .badge-loss { background: linear-gradient(135deg, #fff1f2, #ffe4e6); color: var(--red); font-weight: 600; }
  .ticket-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--text2);
    margin-top: 8px;
    align-items: center;
  }
  .ticket-meta > span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg2);
    padding: 3px 8px;
    border-radius: 5px;
  }
  .ticket-meta .hi { color: var(--green); font-weight: 500; }
  .ticket-meta .lo { color: var(--red); font-weight: 500; }

  /* ── 表单 ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block;
    font-weight: 500;
  }
  .form-label .req { color: var(--red); }
  .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.5; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px; color: var(--text);
    background: var(--bg);
    outline: none; appearance: none;
    font-family: inherit;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
  }
  textarea { resize: vertical; min-height: 60px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: end; }

  .btn {
    width: 100%; padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px; cursor: pointer;
    background: var(--bg); color: var(--text);
    font-family: inherit; transition: all var(--transition);
  }
  .btn:hover { background: var(--bg2); }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(99,102,241,0.25); transition: all var(--transition); }
  .btn-primary:hover { background: linear-gradient(135deg, var(--primary-dark), #4338ca); box-shadow: 0 4px 14px rgba(99,102,241,0.35); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-danger { background: #fff; color: var(--red); border-color: var(--red); }
  .btn-group { display: flex; gap: 8px; margin-top: 4px; }
  .btn-group .btn { flex: 1; }
  .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }

  /* ── 图片上传 ── */
  .upload-area {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    background: var(--bg2);
    transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow-sm);
  }
  .upload-area:hover, .upload-area.drag {
    border-color: var(--primary);
    background: var(--primary-bg);
  }
  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 8px;
    background: var(--primary-bg);
    display: flex; align-items: center; justify-content: center;
    color: var(--primary);
    border-radius: var(--radius);
  }
  .upload-text { font-size: 13px; color: var(--text); }
  .upload-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .upload-area input[type=file] { display: none; }

  .img-preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .img-thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg2);
    border: 1px solid var(--border);
  }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-thumb .remove {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; cursor: pointer;
    line-height: 1;
  }

  /* ── 图片查看器 ── */
  .image-viewer {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .image-viewer.show { display: flex; }
  .image-viewer img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .image-viewer .close-btn {
    position: absolute; top: 20px; right: 20px;
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
    color: #fff;
    border: none; border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .image-viewer .nav-arrows {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 16px; align-items: center;
    color: #fff; font-size: 13px;
  }
  .image-viewer .nav-arrows button {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    color: #fff; border: none;
    border-radius: 50%; font-size: 16px;
    cursor: pointer;
  }
  .image-viewer .nav-arrows button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── 空状态 ── */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }
  .empty .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

  /* ── 提示 ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
    border-radius: 20px; font-size: 13px; pointer-events: none;
    opacity: 0; transition: opacity .25s, transform .25s; white-space: nowrap; z-index: 999;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    padding: 10px 20px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.show { opacity: 1; }

  /* ── 删除按钮 ── */
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; padding: 2px 6px;
    border-radius: 4px; line-height: 1;
  }
  .del-btn:hover { color: var(--red); background: var(--red-bg); border-radius: 6px; }

  .ticket-note {
    font-size: 12px; color: var(--text3); margin-top: 4px;
    font-style: italic;
  }

  .ticket-imgs {
    display: flex; gap: 6px; margin-top: 8px;
    flex-wrap: wrap;
  }
  .ticket-imgs .ti {
    width: 56px; height: 56px;
    border-radius: 6px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    cursor: pointer;
    position: relative;
  }
  .ticket-imgs .ti img { width: 100%; height: 100%; object-fit: cover; }

  /* ── "结算"按钮（成员页）── */
  .settle-row {
    display: flex; gap: 6px;
    margin-top: 6px;
  }
  .settle-row .btn-sm {
    flex: 1;
  }

  /* ── 自定义模态弹窗 ── */
  .modal-mask {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-mask.show { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: 8px;
    padding: 20px;
    max-width: 320px;
    width: 100%;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
  }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .modal-body { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
  .modal-body input {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    margin-top: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .modal-body input:focus { border-color: var(--primary); }
  .modal-body .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1; padding: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
  }
  .modal-actions button.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(99,102,241,0.2); }
  .modal-actions button.danger { background: var(--red); color: #fff; border-color: var(--red); }
  .modal-actions button:active { opacity: 0.8; }

  /* ── 参与者选择 ── */
  .participant-select {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 150px;
    overflow-y: auto;
  }
  .participant-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--bg2);
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-weight: 500;
    font-size: 13px;
    user-select: none;
    transition: all 0.15s;
  }
  .participant-item.selected {
    border-color: var(--primary);
    background: linear-gradient(135deg, var(--primary-bg), var(--primary-bg2));
    color: var(--primary);
    box-shadow: 0 2px 8px rgba(99,102,241,0.12);
  }
  .participant-item input { display: none; }
  .participant-item .checkmark {
    width: 14px; height: 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    font-size: 10px;
  }
  .participant-item.selected .checkmark {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .participant-item.selected .checkmark::after {
    content: '✓';
  }
  .participant-item .p-avatar {
    width: 20px; height: 20px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500;
    color: #fff;
    flex-shrink: 0;
  }
  .participant-actions {
    display: flex; gap: 12px;
    margin-top: 6px;
  }
  .btn-text {
    background: none; border: none;
    color: var(--primary);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 0;
  }
  .btn-text:active { opacity: 0.6; }

  /* ── 三态分段控件（开奖状态）── */
  .seg-control {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg2);
    padding: 3px;
    border-radius: calc(var(--radius) + 2px);
  }
  .seg-opt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border: none;
    border-radius: 8px;
    margin: 0 2px;
    transition: all var(--transition);
    user-select: none;
    font-weight: 500;
  }
  .seg-opt:hover { background: var(--primary-bg); color: var(--primary); }
  .seg-opt:last-child { border-right: none; }
  .seg-opt input { display: none; }
  .seg-opt.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(99,102,241,0.25);
  }
  .seg-opt:active { opacity: 0.8; }

  /* ── 徽章：待开奖 ── */
  .badge-pending {
    background: linear-gradient(135deg, #fffbe6, #fff7cc);
    color: #d48806;
    border: 1px solid #ffe58f;
    font-weight: 600;
    animation: pulse-pending 2s infinite;
  }
  @keyframes pulse-pending {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ── 票卡片操作栏 ── */
  .ticket-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .ticket-actions button {
    flex: 1;
    min-width: 80px;
    padding: 7px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 500;
    transition: all var(--transition);
    border-radius: var(--radius-sm);
  }
  .ticket-actions button:hover {
    background: var(--bg2);
    border-color: var(--primary);
    color: var(--primary);
  }
  .ticket-actions button:active { opacity: 0.75; transform: scale(0.97); }
  .btn-settle {
    border-color: var(--primary) !important;
    color: var(--primary) !important;
    background: rgba(99,102,241,0.06) !important;
    font-weight: 600 !important;
  }
  .btn-settle:hover { background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important; color: #fff !important; box-shadow: 0 2px 8px rgba(99,102,241,0.25); }
  .btn-resettle {
    border-color: var(--text3) !important;
    color: var(--text2) !important;
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-bar">
    <div>
      <h1>老爷保佑</h1>
      <div class="sub" id="top-sub">加载中...</div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">清空数据</button>
  </div>

  <div class="pages">
    <!-- ===== 总览页 ===== -->
    <div class="page active" id="pg-overview">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">总预存</div>
          <div class="stat-value" id="ov-total-deposit">¥0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已花费</div>
          <div class="stat-value red" id="ov-total-spent">¥0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总中奖</div>
          <div class="stat-value green" id="ov-total-win">¥0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">奖池余额</div>
          <div class="stat-value blue" id="ov-pool">¥0.00</div>
        </div>
      </div>

      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 10px;">
          <span>各成员盈亏明细</span>
          <span class="badge-count" id="ov-members-count"></span>
        </p>
        <div id="ov-members-list"></div>
      </div>

    </div>

    <!-- ===== 成员详情页 ===== -->
    <div class="page" id="pg-member-detail">
      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 12px;">
          <span id="detail-member-name">成员详情</span>
          <span class="badge-count" id="detail-member-type"></span>
        </p>
        <div id="detail-member-info"></div>
      </div>

      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 10px;">
          <span>资金流水</span>
          <span class="badge-count" id="detail-transactions-count"></span>
        </p>
        <div id="detail-transactions"></div>
      </div>

      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 10px;">
          <span>购票记录</span>
          <span class="badge-count" id="detail-tickets-count"></span>
        </p>
        <div id="detail-tickets"></div>
      </div>
    </div>

    <!-- ===== 成员页 ===== -->
    <div class="page" id="pg-members">
      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 10px;">
          <span>成员列表</span>
          <span class="badge-count" id="mem-page-count"></span>
        </p>
        <div id="member-list-wrap"></div>
      </div>

      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 12px;">添加成员 / 充值</p>
        <div class="form-group">
          <label class="form-label"><span class="req">*</span> 姓名</label>
          <input type="text" id="m-name" placeholder="如：小张">
        </div>

        <label class="credit-toggle">
          <input type="checkbox" id="m-credit" onchange="toggleCreditMode()">
          <div class="lbl">
            代垫模式（先不预存，输了他给我，赢了我给他）
            <div class="hint">勾选后此人不预存，盈亏转为"应收/应付"金额</div>
          </div>
        </label>

        <div class="form-group" id="m-capital-group">
          <label class="form-label">预存本金（元）</label>
          <input type="number" id="m-capital" placeholder="200" min="0">
          <div class="form-hint">已存在的成员将作为"充值"累加。新成员中途加入时，加入前的票不会分摊给他</div>
        </div>
        <button class="btn btn-primary" onclick="addMember()">保存</button>
      </div>
    </div>

    <!-- ===== 彩票页 ===== -->
    <div class="page" id="pg-tickets">
      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 10px;">
          <span>彩票记录</span>
        <span class="badge-count" id="tkt-page-count"></span>
      </p>
      <div id="ticket-list-wrap"></div>
      </div>
    </div>

    <!-- ===== 记账页 ===== -->
    <div class="page" id="pg-add">
      <div class="content-card" style="padding:14px 12px;">
        <p class="section-title" style="margin:0 0 12px;">录入彩票</p>

      <div class="form-group">
        <label class="form-label"><span class="req">*</span> 彩票名称 / 期号</label>
        <input type="text" id="t-name" placeholder="如：世界杯 决赛 巴西 vs 阿根廷">
      </div>

      <div class="form-group">
        <label class="form-label">竞猜比赛（可选）</label>
        <div class="row3">
          <input type="text" id="t-teamA" placeholder="主队">
          <span style="text-align:center; padding:10px 4px; color:var(--text3); font-size:13px;">VS</span>
          <input type="text" id="t-teamB" placeholder="客队">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><span class="req">*</span> 购买金额（元）</label>
        <input type="number" id="t-cost" placeholder="200" min="0" oninput="calcPreview()">
        <div class="form-hint" id="cost-hint">从奖池扣除</div>
      </div>

      <div class="form-group">
        <label class="form-label">购买日期</label>
        <input type="date" id="t-date">
      </div>

      <div class="form-group">
        <label class="form-label">参与成员（默认全选）</label>
        <div class="participant-select" id="participant-select"></div>
        <div class="participant-actions">
          <button type="button" class="btn-text" onclick="selectAllParticipants(true)">全选</button>
          <button type="button" class="btn-text" onclick="selectAllParticipants(false)">全不选</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">竞猜内容 / 投注号码（可选）</label>
        <textarea id="t-note" placeholder="如：猜 2:1、胜平负、让球数等"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">彩票图片（可拍照或从相册选）</label>
        <label class="upload-area" id="upload-area">
          <div class="upload-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>
          <div class="upload-text">点击上传彩票照片</div>
          <div class="upload-hint">支持多张 · JPG/PNG · 最多 9 张</div>
          <input type="file" id="t-images" accept="image/*" multiple capture="environment" onchange="handleImageSelect(event)">
        </label>
        <div class="img-preview-grid" id="img-preview-grid"></div>
      </div>

      <!-- 实时预览 -->
      <div class="card" id="preview-card" style="display:none; background:var(--bg2); border:none; padding:12px 14px;">
        <div class="stat-label" style="margin-bottom:8px; font-size:12px;">奖池变化预览</div>
        <div id="preview-content"></div>
      </div>

        <button class="btn btn-primary" onclick="addTicket()" style="margin-top:4px">保存记录</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="0" onclick="switchPage(0)">
      <div class="nav-icon">📊</div>总览
    </button>
    <button class="nav-item" data-page="1" onclick="switchPage(1)">
      <div class="nav-icon">👥</div>成员
    </button>
    <button class="nav-item" data-page="2" onclick="switchPage(2)">
      <div class="nav-icon">🎟</div>彩票
    </button>
    <button class="nav-item" data-page="3" onclick="switchPage(3)">
      <div class="nav-icon">✏️</div>记票
    </button>
  </nav>
</div>

<div class="image-viewer" id="image-viewer">
  <button class="close-btn" onclick="closeViewer()">×</button>
  <img id="viewer-img" src="" alt="">
  <div class="nav-arrows">
    <button id="prev-btn" onclick="viewerNav(-1)">‹</button>
    <span id="viewer-pos">1 / 1</span>
    <button id="next-btn" onclick="viewerNav(1)">›</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 自定义模态弹窗 -->
<div class="modal-mask" id="modal-mask" onclick="if(event.target===this)closeModal(false)">
  <div class="modal">
    <div class="modal-title" id="modal-title">提示</div>
    <div class="modal-body" id="modal-body">内容</div>
    <div class="modal-actions" id="modal-actions">
      <button onclick="closeModal(false)">取消</button>
      <button class="primary" id="modal-ok" onclick="closeModal(true)">确定</button>
    </div>
  </div>
</div>

<!-- 开奖/修改结算弹窗 -->
<div class="modal-mask" id="settle-mask" onclick="if(event.target===this)closeSettleModal(false)">
  <div class="modal" style="max-width:340px">
    <div class="modal-title" id="settle-title">开奖结算</div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;" id="settle-sub"></div>
      <div class="seg-control" id="settle-control">
        <label class="seg-opt" data-value="pending" onclick="setSettleStatus('pending')">
          <input type="radio" name="s-status" value="pending"> ⏳ 待开奖
        </label>
        <label class="seg-opt" data-value="won" onclick="setSettleStatus('won')">
          <input type="radio" name="s-status" value="won"> 🏆 中奖
        </label>
        <label class="seg-opt" data-value="lost" onclick="setSettleStatus('lost')">
          <input type="radio" name="s-status" value="lost"> 未中奖
        </label>
      </div>
      <div class="form-group" id="settle-win-group" style="display:none;margin-top:12px;">
        <label class="form-label" style="font-size:12px;color:var(--text3);margin-bottom:4px;display:block;">中奖金额（元）</label>
        <input type="number" id="settle-win" min="0" step="0.01" placeholder="0.00" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);outline:none;">
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeSettleModal(false)">取消</button>
      <button class="primary" onclick="closeSettleModal(true)">保存</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   成员详情页
   ══════════════════════════════════════════ */
let currentDetailMemberId = null;

function showMemberDetail(memberId) {
  const m = members.find(x => x.id === memberId);
  if (!m) return;
  currentDetailMemberId = memberId;
  renderMemberDetail();
  switchPage(4);
}

function renderMemberDetail() {
  const m = members.find(x => x.id === currentDetailMemberId);
  if (!m) return;

  const { memberStats } = calcStats();
  const s = memberStats[m.id];
  const isCredit = s.type === 'credit';
  const idx = members.findIndex(x => x.id === m.id);
  const [bg, fg] = getColor(idx);

  document.getElementById('detail-member-name').textContent = m.name;
  document.getElementById('detail-member-type').innerHTML = isCredit
    ? '<span class="badge-type credit">代垫</span>'
    : '<span class="badge-type paid">已存</span>';

  let infoHtml = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">' +
    '<div class="avatar" style="background:' + bg + ';color:' + fg + ';width:48px;height:48px;font-size:16px;">' + escapeHtml(m.name.slice(0,2)) + '</div>' +
    '<div><div style="font-size:18px;font-weight:700;color:var(--text);">' + escapeHtml(m.name) + '</div>' +
    '<div style="font-size:12px;color:var(--text3);margin-top:4px;">' + (isCredit ? '代垫模式' : '已预存 ' + fmt(m.capital)) + '</div></div></div>';

  if (isCredit) {
    const profit = s.profit;
    infoHtml += '<div class="stat-grid" style="gap:8px;margin-bottom:12px;">' +
      '<div class="stat-card" style="padding:10px 12px;"><div class="stat-label">已花成本</div><div class="stat-value" style="font-size:18px;">' + fmt(s.perCost) + '</div></div>' +
      '<div class="stat-card" style="padding:10px 12px;"><div class="stat-label">分得奖金</div><div class="stat-value green" style="font-size:18px;">' + fmt(s.perWin) + '</div></div></div>' +
      '<div class="stat-card" style="padding:12px 14px;"><div class="stat-label">净盈亏</div><div class="stat-value" style="font-size:20px;color:' + (profit >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (profit >= 0 ? '+' : '') + fmt(profit) + '</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:4px;">' + (profit < 0 ? '他欠你 ' + fmt(-profit) : (profit > 0 ? '你欠他 ' + fmt(profit) : '盈亏平衡')) + '</div></div>';
  } else {
    const remaining = s.remaining;
    const profit = s.profit;
    const pct = m.capital > 0 ? Math.max(0, Math.min(100, remaining / m.capital * 100)) : 0;
    infoHtml += '<div class="stat-grid" style="gap:8px;margin-bottom:12px;">' +
      '<div class="stat-card" style="padding:10px 12px;"><div class="stat-label">预存本金</div><div class="stat-value blue" style="font-size:18px;">' + fmt(m.capital) + '</div></div>' +
      '<div class="stat-card" style="padding:10px 12px;"><div class="stat-label">本金余额</div><div class="stat-value" style="font-size:18px;color:' + (remaining >= 0 ? 'var(--text)' : 'var(--red)') + ';">' + fmt(remaining) + '</div></div></div>' +
      '<div class="stat-card" style="padding:12px 14px;margin-bottom:12px;"><div class="stat-label">已花成本 / 分得奖金</div><div style="font-size:14px;margin:8px 0;"><span style="color:var(--red);">' + fmt(s.perCost) + '</span><span style="color:var(--text3);margin:0 8px;">/</span><span style="color:var(--green);">' + fmt(s.perWin) + '</span></div>' +
      '<div class="stat-label" style="margin-top:8px;">净盈利</div><div class="stat-value" style="font-size:20px;color:' + (profit >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (profit >= 0 ? '+' : '') + fmt(profit) + '</div></div>' +
      '<div class="stat-card" style="padding:12px 14px;"><div class="stat-label">本金使用进度</div><div class="balance-bar" style="margin-top:8px;"><div class="balance-bar-fill ' + (pct < 20 ? 'danger' : (pct < 50 ? 'warn' : '')) + '" style="width:' + pct + '%;"></div></div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:6px;">已使用 ' + (100 - pct).toFixed(1) + '%</div></div>';
  }

  document.getElementById('detail-member-info').innerHTML = infoHtml;
  renderMemberTransactions(m.id);
  renderMemberTickets(m.id);
}

function renderMemberTransactions(memberId) {
  const m = members.find(x => x.id === memberId);
  if (!m) return;

  const transactions = [];
  tickets.forEach(t => {
    const status = t.status || (t.win > 0 ? 'won' : 'lost');
    let activeMembers;
    if (t.participants && t.participants.length > 0) {
      activeMembers = t.participants;
    } else {
      const tCreated = t.createdAt || 0;
      activeMembers = members.filter(x => (x.joinedAt || 0) <= tCreated).map(x => x.id);
    }
    if (!activeMembers.includes(memberId)) return;

    const n = activeMembers.length;
    const perCost = t.cost / n;
    const perWin = status === 'pending' ? 0 : (t.win / n);

    transactions.push({ date: t.date || '', ticketName: t.name, ticketId: t.id, type: 'cost', amount: -perCost, status: status });
    if (status !== 'pending' && perWin > 0) {
      transactions.push({ date: t.date || '', ticketName: t.name, ticketId: t.id, type: 'win', amount: perWin, status: status });
    }
  });

  transactions.sort((a, b) => {
    const dateA = a.date ? new Date(a.date).getTime() : 0;
    const dateB = b.date ? new Date(b.date).getTime() : 0;
    return dateB - dateA;
  });

  document.getElementById('detail-transactions-count').textContent = transactions.length + ' 条';

  if (transactions.length === 0) {
    document.getElementById('detail-transactions').innerHTML = '<div class="empty" style="padding:20px 0;"><div class="empty-icon">📊</div>暂无资金流水</div>';
    return;
  }

  const html = transactions.map(t => {
    const sign = t.amount >= 0 ? '+' : '';
    const color = t.type === 'win' ? 'var(--green)' : 'var(--red)';
    const icon = t.type === 'win' ? '🏆' : '💰';
    const label = t.type === 'win' ? '中奖' : '购票';
    const statusBadge = t.status === 'pending' ? '<span class="badge-pending" style="font-size:10px;padding:1px 4px;">待开奖</span>' : '';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);"><div style="font-size:20px;">' + icon + '</div>' +
      '<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--text);">' + label + '：' + escapeHtml(t.ticketName) + '</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:2px;">' + (t.date || '') + ' ' + statusBadge + '</div></div>' +
      '<div style="font-size:15px;font-weight:600;color:' + color + ';white-space:nowrap;">' + sign + fmt(t.amount) + '</div></div>';
  }).join('');

  document.getElementById('detail-transactions').innerHTML = html;
}

function renderMemberTickets(memberId) {
  const m = members.find(x => x.id === memberId);
  if (!m) return;

  const memberTickets = tickets.filter(t => {
    if (t.participants && t.participants.length > 0) return t.participants.includes(memberId);
    else return ((m.joinedAt || 0) <= (t.createdAt || 0));
  });

  document.getElementById('detail-tickets-count').textContent = memberTickets.length + ' 张';

  if (memberTickets.length === 0) {
    document.getElementById('detail-tickets').innerHTML = '<div class="empty" style="padding:20px 0;"><div class="empty-icon">🎟</div>暂无购票记录</div>';
    return;
  }

  const html = [...memberTickets].reverse().map(t => {
    const status = t.status || (t.win > 0 ? 'won' : 'lost');
    const n = t.participants ? t.participants.length : members.filter(x => (x.joinedAt || 0) <= (t.createdAt || 0)).length;
    const perCost = n > 0 ? t.cost / n : 0;
    const perWin = (status !== 'pending' && n > 0) ? t.win / n : 0;
    const badge = status === 'won' ? '<span class="badge badge-win">🏆 中奖 ' + fmt(t.win) + '</span>' : (status === 'lost' ? '<span class="badge badge-loss">未中奖</span>' : '<span class="badge badge-pending">⏳ 待开奖</span>');
    return '<div class="ticket-item" style="margin-bottom:8px;padding:12px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;"><span style="font-size:14px;font-weight:600;flex:1;line-height:1.4;color:var(--text);">' + escapeHtml(t.name) + '</span>' + badge + '</div>' +
      '<div style="font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;"><span>花费 ' + fmt(t.cost) + '</span><span>·</span><span>人均 ' + fmt(perCost) + '</span>' +
      (status !== 'pending' ? '<span>· 分得 <span style="color:var(--green);font-weight:500;">' + fmt(perWin) + '</span></span>' : '') + '</div>' +
      (t.date ? '<div style="font-size:11px;color:var(--text3);margin-top:4px;">' + t.date + '</div>' : '') + '</div>';
  }).join('');

  document.getElementById('detail-tickets').innerHTML = html;
}

/* ═══════════════════════════════════════════
   IndexedDB 图片存储
   ═══════════════════════════════════════════ */
const DB_NAME = 'WorldCupLotteryDB';
const DB_VERSION = 1;
const STORE_IMAGES = 'images';

let dbPromise = null;
function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_IMAGES)) {
        db.createObjectStore(STORE_IMAGES, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
  return dbPromise;
}

async function saveImage(id, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_IMAGES, 'readwrite');
    tx.objectStore(STORE_IMAGES).put({ id, blob });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

async function getImage(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_IMAGES, 'readonly');
    const req = tx.objectStore(STORE_IMAGES).get(id);
    req.onsuccess = () => resolve(req.result ? req.result.blob : null);
    req.onerror = e => reject(e.target.error);
  });
}

async function deleteImage(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_IMAGES, 'readwrite');
    tx.objectStore(STORE_IMAGES).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

const imageUrlCache = new Map();
async function getImageUrl(id) {
  if (!id) return null;
  if (imageUrlCache.has(id)) return imageUrlCache.get(id);
  const blob = await getImage(id);
  if (!blob) return null;
  const url = URL.createObjectURL(blob);
  imageUrlCache.set(id, url);
  return url;
}

/* 自定义模态弹窗（替代 prompt/confirm） */
let modalResolver = null;
function openModal({ title, body, okText='确定', cancelText='取消', danger=false, withInput=false, defaultValue='' }) {
  return new Promise(resolve => {
    document.getElementById('modal-title').textContent = title || '提示';
    const bodyEl = document.getElementById('modal-body');
    if (withInput) {
      bodyEl.innerHTML = `<div>${body}</div>
        <input type="number" id="modal-input" value="${defaultValue}" min="0" step="0.01" autofocus>
        <div class="sub" id="modal-sub"></div>`;
      setTimeout(() => {
        const inp = document.getElementById('modal-input');
        if (inp) { inp.focus(); inp.select(); }
      }, 50);
    } else {
      bodyEl.innerHTML = body || '';
    }
    const okBtn = document.getElementById('modal-ok');
    okBtn.textContent = okText;
    okBtn.className = danger ? 'danger' : 'primary';
    document.querySelector('#modal-actions button:first-child').textContent = cancelText;
    modalResolver = resolve;
    document.getElementById('modal-mask').classList.add('show');
  });
}
function closeModal(ok) {
  document.getElementById('modal-mask').classList.remove('show');
  if (!modalResolver) return;
  let result = ok;
  if (ok) {
    const inp = document.getElementById('modal-input');
    if (inp) result = inp.value;  // 返回输入框值（字符串）
  }
  modalResolver(result);
  modalResolver = null;
}

/* ═══════════════════════════════════════════
   核心计算（预存款 + 代垫混合模型）
   ═══════════════════════════════════════════
   成员 type:
     'paid'   - 已预存（默认）：capital 为累计预存
                 remaining = capital - 累计承担成本 + 累计分得奖金
                 正数 = 还剩这么多本金；负数 = 已花超本
     'credit' - 代垫（不预存）：capital = 0
                 profit = 分得奖金 - 承担成本
                 正数 = 庄家应付给他（应付）；负数 = 他欠庄家（应收）
   奖池余额 = 总预存 - 总花费 + 总中奖
   （庄家为代垫成员先花的钱，由奖池减项体现）
   ═══════════════════════════════════════════ */
function calcStats() {
  // 兼容老数据：老票没有 status 字段，按 win 是否 > 0 推断
  // 已花费（含待开奖）：所有票的 cost 都要从成员本金扣除
  // 奖池余额和总奖金：只算已结算的票（pending 票钱在成员账户，未结到奖池）
  const allTickets = tickets;
  const settledTickets = tickets.filter(t => {
    const status = t.status || (t.win > 0 ? 'won' : 'lost');
    return status !== 'pending';
  });
  const totalDeposit = members.reduce((s, m) => s + m.capital, 0);
  // 总花费 = 所有票的花费（含待开奖，因为本金已经实际扣除了）
  const totalCost = allTickets.reduce((s, t) => s + t.cost, 0);
  // 总奖金 = 只算已结算的（pending 票奖金还没拿到手）
  const totalWin = settledTickets.reduce((s, t) => s + t.win, 0);
  // 奖池余额 = 总预存 - 总花费 + 总奖金（已结）
  // 注意：这里"已花费"也含待开奖，奖池会被预扣；开奖后 win 加回，pending 票输了则 win=0 不变
  const pool = totalDeposit - totalCost + totalWin;  // 奖池余额
  const count = tickets.length;  // 显示总票数（含待开奖）
  const n = members.length;

  // 庄家"垫出"的钱：= 总花费 - (已预存成员的预存总和)
  // 若 pool 为正 → 奖池仍有结余；若 pool 为负 → 庄家已自掏腰包
  const advanced = Math.max(0, totalCost - totalDeposit);

  const memberStats = {};
  members.forEach(m => {
    memberStats[m.id] = {
      type: m.type || 'paid',
      capital: m.capital,
      perCost: 0,
      perWin: 0,
      remaining: m.capital,  // 已存：剩余本金；代垫：应付给他（正）/ 应收他（负）
      profit: 0,             // 净盈亏：分得 - 承担
      settled: m.settled || 0,    // 手动结算（兼容老逻辑）
      lentOut: m.lentOut || 0,    // 庄家为该成员累计垫出多少
      repaid: m.repaid || 0,      // 该成员累计已还多少
    };
  });

  // 对每张票（无论是否已开奖）都分摊成本：因为成本是记票时就实际扣除的
  // 但奖金只分已开奖的（pending 票奖金还没拿到手）
  allTickets.forEach(t => {
    const status = t.status || (t.win > 0 ? 'won' : 'lost');
    // 新逻辑：使用 participants 数组（手动选择参与成员）
    let activeMembers;
    if (t.participants && t.participants.length > 0) {
      activeMembers = members.filter(m => t.participants.includes(m.id));
    } else {
      // 旧逻辑兼容：按 joinedAt 过滤（老数据无 participants 字段）
      const tCreated = t.createdAt || 0;
      activeMembers = members.filter(m => (m.joinedAt || 0) <= tCreated);
    }
    const n2 = activeMembers.length;
    if (n2 === 0) return;
    const perCost = t.cost / n2;
    // pending 票的 win=0，相当于不参与奖金分配；已开奖的才分奖金
    const perWin = status === 'pending' ? 0 : (t.win / n2);
    activeMembers.forEach(m => {
      memberStats[m.id].perCost += perCost;
      memberStats[m.id].perWin += perWin;
      // 本金余额 = 本金 - 已花成本（一直减少，不因中奖而增加）
      memberStats[m.id].remaining = m.capital - memberStats[m.id].perCost;
      // 累计盈利 = 分得奖金 - 承担成本（另外计算）
      memberStats[m.id].profit = memberStats[m.id].perWin - memberStats[m.id].perCost;
    });
  });

  // 对代垫成员：净盈亏自动结清垫款 + 手动结算
  members.forEach(m => {
    if (m.type === 'credit') {
      const s = memberStats[m.id];
      // 奖金自动还款：如果有未还垫款且本次盈利，先用盈利还款
      const outstandingLoan = Math.max(0, (s.lentOut || 0) - (s.repaid || 0));
      if (s.profit > 0 && outstandingLoan > 0) {
        const autoRepay = Math.min(s.profit, outstandingLoan);
        s.profit -= autoRepay;
        s.autoRepaid = autoRepay;  // 显示用：本轮自动还款
      } else {
        s.autoRepaid = 0;
      }
      // 再扣减手动结算
      s.profit -= (s.settled || 0);
      s.remaining = s.profit;  // 代垫：remaining = 结算后盈亏
    }
  });

  // 应收总额（庄家应收的）= 所有负 profit 之和的绝对值
  let totalReceivable = 0;
  let totalPayable = 0;
  members.forEach(m => {
    if (m.type === 'credit') {
      if (memberStats[m.id].profit < 0) totalReceivable += -memberStats[m.id].profit;
      else totalPayable += memberStats[m.id].profit;
    }
  });

  return { totalDeposit, totalCost, totalWin, pool, advanced, count, memberStats, n, totalReceivable, totalPayable };
}

/* ═══════════════════════════════════════════
   渲染：总览页
   ═══════════════════════════════════════════ */
function renderOverview() {
  const { totalDeposit, totalCost, totalWin, pool, advanced, count, memberStats, n, totalReceivable, totalPayable } = calcStats();

  document.getElementById('ov-total-deposit').textContent = fmt(totalDeposit);
  document.getElementById('ov-total-spent').textContent = fmt(totalCost);
  document.getElementById('ov-total-win').textContent = fmt(totalWin);
  document.getElementById('ov-pool').textContent = fmt(pool);

  document.getElementById('top-sub').textContent =
    members.length + ' 人 · ' + count + ' 张彩票';

  document.getElementById('ov-members-count').textContent = members.length + ' 人';

  const wrap = document.getElementById('ov-members-list');
  if (members.length === 0) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>还没有成员，请先添加</div>';
  } else {
    wrap.innerHTML = members.map((m, i) => {
      const s = memberStats[m.id];
      const isCredit = s.type === 'credit';
      const profit = s.profit;
      const remaining = s.remaining;
      const [bg, fg] = getColor(i);
      const typeBadge = isCredit
        ? '<span class="badge-type credit">代垫</span>'
        : '<span class="badge-type paid">已存</span>';

      let mainAmountHtml, mainLabel, barHtml = '';
      if (isCredit) {
        // 代垫成员：profit < 0 → 他欠钱（应收）；profit > 0 → 应付给他
        if (profit < 0) {
          mainAmountHtml = `<span class="amount-receivable">${fmt(-profit)}</span>`;
          mainLabel = '应收（他欠我）';
          barHtml = `<div class="balance-bar"><div class="balance-bar-fill danger" style="width:100%"></div></div>`;
        } else if (profit > 0) {
          mainAmountHtml = `<span class="amount-payable">${fmt(profit)}</span>`;
          mainLabel = '应付（我欠他）';
          barHtml = `<div class="balance-bar"><div class="balance-bar-fill" style="width:100%; background:var(--purple)"></div></div>`;
        } else {
          mainAmountHtml = `<span style="color:var(--text3)">¥0.00</span>`;
          mainLabel = '盈亏平衡';
        }
      } else {
        // 已存成员：本金余额（一直在减）+ 累计盈利（另外算）
        const pct = m.capital > 0 ? Math.max(0, Math.min(100, remaining / m.capital * 100)) : 0;
        const barCls = pct < 20 ? 'danger' : (pct < 50 ? 'warn' : '');
        mainAmountHtml = `<span class="${remaining>=0?'amount-remaining':'amount-receivable'}">${fmt(remaining)}</span>`;
        mainLabel = `盈利 ${profit >= 0 ? '+' : ''}${fmt(profit)}`;
        barHtml = `<div class="balance-bar"><div class="balance-bar-fill ${barCls}" style="width:${pct}%"></div></div>`;
      }

      return `<div class="member-row" onclick="showMemberDetail('${m.id}')" style="cursor:pointer;">
        <div class="avatar" style="background:${bg};color:${fg}">${escapeHtml(m.name.slice(0,2))}</div>
        <div class="member-info">
          <div class="member-name">${escapeHtml(m.name)}${typeBadge}</div>
          <div class="member-sub">
            ${isCredit
              ? `<span class="seg">已花 <b>${fmt(s.perCost)}</b></span>
                 <span class="seg">分得 <b style="color:var(--green)">${fmt(s.perWin)}</b></span>`
              : `<span class="seg">预存 <b>${fmt(m.capital)}</b></span>
                 <span class="seg">已花 <b>${fmt(s.perCost)}</b></span>
                 <span class="seg">分得 <b style="color:var(--green)">${fmt(s.perWin)}</b></span>`}
          </div>
          ${barHtml}
        </div>
        <div class="member-right">
          ${mainAmountHtml}
          <div class="sub">${isCredit ? mainLabel : '本金余额'}</div>
          ${!isCredit ? `<div class="sub" style="color:${profit>=0?'var(--green)':'var(--red)'}">盈利${profit >= 0 ? '+' : ''}${fmt(profit)}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    // 结算清单：代垫成员有"应收/应付"时显示
    const credits = members.filter(m => m.type === 'credit');
    if (credits.length > 0 && (totalReceivable > 0 || totalPayable > 0)) {
      wrap.innerHTML += `<div class="settle-card">
        <div class="sc-title">📋 庄家与代垫成员结算清单</div>
        ${credits.map(m => {
          const s = memberStats[m.id];
          if (s.profit < 0) {
            return `<div class="settle-row-item">
              <span class="name">${escapeHtml(m.name)} <span class="desc">输了，欠你</span></span>
              <span class="num amount-receivable">应收 ${fmt(-s.profit)}</span>
            </div>`;
          } else if (s.profit > 0) {
            return `<div class="settle-row-item">
              <span class="name">${escapeHtml(m.name)} <span class="desc">赢了，应分给他</span></span>
              <span class="num amount-payable">应付 ${fmt(s.profit)}</span>
            </div>`;
          }
          return `<div class="settle-row-item">
            <span class="name">${escapeHtml(m.name)} <span class="desc">当前盈亏平衡</span></span>
            <span class="num" style="color:var(--text3)">¥0.00</span>
          </div>`;
        }).join('')}
      </div>`;
    }
  }

  const rWrap = document.getElementById('ov-recent-tickets');
  if (rWrap) {
    const recent = [...tickets].reverse().slice(0, 3);
    if (recent.length === 0) {
      rWrap.innerHTML = '<div class="empty"><div class="empty-icon">⚽</div>还没有彩票记录</div>';
    } else {
      rWrap.innerHTML = recent.map(t => renderTicketItem(t, false)).join('');
      recent.forEach(t => renderTicketImages(t));
    }
  }
}
